<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" content>
        <title>Table Introduction</title>

        <style>
            table {
                width: 650px;
                background-color: aliceblue;
                margin-left: 25px;
                margin-top: 25px;
            }

            table, td, th{
                border: 2px solid black;
                border-collapse: collapse;
                font-size: 24px;
            }

            td, th{
                padding: 12px
            }
        </style>
    </head>
    <body>
        <table>
            <caption>A Table</caption>
            <tr>
                <td rowspan="7">Hours</td>
                <th>Senin</th>
                <th>Selasa</th>
                <th>Rabu</th>
                <th>Kamis</th>
                <th>Jumat</th>
            </tr>
            <tr>
                <td>Content 1</td>
                <td>Content 2</td>
                <td>Content 3</td>
                <td>Content 4</td>
                <td>Content 5</td>
            </tr>
            <tr>
                <td>Content 1</td>
                <td>Content 2</td>
                <td>Content 3</td>
                <td>Content 4</td>
                <td>Content 5</td>
            </tr>
            <tr>
                <td>Content 1</td>
                <td>Content 2</td>
                <td>Content 3</td>
                <td>Content 4</td>
                <td>Content 5</td>
            </tr>
            <tr>
                <td colspan="5" style="text-align:center">Break</td>
            </tr>
            <tr>
                <td>Content 1</td>
                <td>Content 2</td>
                <td>Content 3</td>
                <td>Content 4</td>
                <td>Content 5</td>
            </tr>
            <tr>
                <td>Content 1</td>
                <td>Content 2</td>
                <td>Content 3</td>
                <td>Content 4</td>
                <td>Content 5</td>
            </tr>
        </table>
    </body>
</html>
