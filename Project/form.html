<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" content>
        <title>Register Form</title> 

        <style>
            body {
                background-color: #f2f6ff;
                margin: 0;
                padding: 18px;
            }

            form {
                background-color:white;
                width: 700px;
                margin-left: auto;
                margin-right: auto;
                text-align:center;
                border: 1px solid #ccc;
            }

            .socials-icons {
                width: 50px;
                height: 50px;
                padding-top: 16px;
                padding-bottom: 16px;
                padding-right: 32px;
                padding-left: 32px;
            }

            .input-box {
                font-size: 18px;
                padding-bottom: 12px;
                margin-bottom: 36px;
                border: 0;
                border-bottom: 1px solid #ccc;
                width:100%;

            }

            #social-wrapper {
                background-color: #f2f6ff;
                padding: 24px;
                
            }

            #input-wrapper {
                padding-top: 80px;
                padding-bottom: 40px;
                padding-left: 80px;
                padding-right: 80px;
            }

            #btn-submit {
                background-color: #0056ff;
                padding-top: 12px;
                padding-bottom: 12px;
                padding-left: 24px;
                padding-right: 24px;
                font-size: 18px;
                color: white;
                border: none;
            }
        </style>
    </head>
    <body>
        <form id="forms">
            <h1 style="font-size: 32px; padding-top: 56px; padding-bottom: 32px;">Register</h1>
            <div id="social-wrapper">
                <img class="socials-icons" src="http://pluspng.com/img-png/google-logo-png-open-2000.png" alt="Google Logo">
                <img class="socials-icons" src="https://cdn4.iconfinder.com/data/icons/social-media-icons-the-circle-set/48/facebook_circle-512.png" alt="Facebook Logo">
                <img class="socials-icons" src="https://cdn-icons-png.flaticon.com/512/25/25231.png" alt="GitHub Logo">
                <img class="socials-icons" src="https://cdn4.iconfinder.com/data/icons/social-media-icons-the-circle-set/48/linkedin_circle-512.png" alt="Linkedln Logo">
            </div>

            <div id="input-wrapper">
                <div>
                    <input class="input-box" type="text" name="username" placeholder="Username">
                </div>
                <div>
                    <input class="input-box" type="email" name="email" placeholder="Email">
                </div>
                <div>
                    <input class="input-box" type="password" name="password" placeholder="Password">
                </div>
                <div>
                    <input class="input-box" type="password" name="confirm-password" placeholder="Confirm Password">
                </div>

                <input id="btn-submit" type="submit" value="Register">
            </div>
        </form>
    </body>
</html>
